name: RUN TSPLIB | const_tsp | MCTS_TD

on:
  workflow_dispatch:
    inputs:
      model:
        description: "LLM model to use"
        type: choice
        required: true
        default: gpt-4o-mini
        options:
          - gpt-4o-mini
          - gpt-5-nano

jobs:
  # ============================================================
  # Job 1: Checkout private repo → Run AHD experiment
  # ============================================================
  run_experiment:
    name: RUN | const_tsp | mcts_top
    runs-on: ubuntu-latest

    steps:
      - name: CHECKOUT PRIVATE REPO
        uses: actions/checkout@v4
        with:
          repository: Pham2004/RUN_BRIDGE
          token: ${{ secrets.CHECKOUT_TOKEN }}

      - name: SET UP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: INSTALL DEPENDENCIES
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: RUN EXPERIMENT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python main.py \
            llm.model=${{ github.event.inputs.model }} \
            problem=const_tsp \
            framework=mcts_top

      - name: UPLOAD RESULTS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-const_tsp-mcts_td-${{ github.run_id }}
          path: results/
          retention-days: 30

  # ============================================================
  # Job 2: Evaluate func_best.py on TSPLIB (matrix over buckets)
  # ============================================================
  evaluate_tsplib:
    name: TSPLIB | bucket=${{ matrix.bucket }}
    needs: run_experiment
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        bucket: ["100_199", "200_499", "500_999"]

    steps:
      - name: CHECKOUT PRIVATE REPO (BRIDGE)
        uses: actions/checkout@v4
        with:
          repository: Pham2004/RUN_BRIDGE
          token: ${{ secrets.CHECKOUT_TOKEN }}

      - name: SET UP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: INSTALL DEPENDENCIES
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tsplib95

      - name: DOWNLOAD RESULTS
        uses: actions/download-artifact@v4
        with:
          name: results-const_tsp-mcts_td-${{ github.run_id }}
          path: results/

      - name: FIND AND COPY func_best.py
        run: |
          BEST=$(find results/const_tsp/ -name "func_best.py" -type f | head -1)
          if [ -z "$BEST" ]; then
            echo "ERROR: func_best.py not found in results/const_tsp/"
            find results/ -name "*.py" -type f
            exit 1
          fi
          echo "Found: $BEST"
          cp "$BEST" problems/const_tsp/func_best.py
          echo "--- func_best.py ---"
          cat problems/const_tsp/func_best.py

      - name: DOWNLOAD TSPLIB DATA
        run: python download_tsplib.py

      - name: PATCH run_tsplib.py FOR RELATIVE PATH
        run: |
          sed -i 's|Path("f:/BRIDGE/tsplib_data")|Path("tsplib_data")|g' \
            problems/const_tsp/run_tsplib.py

      - name: RUN TSPLIB (bucket=${{ matrix.bucket }})
        run: |
          python problems/const_tsp/run_tsplib.py \
            --module func_best.py \
            --bucket ${{ matrix.bucket }}
